<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/174/174855.png">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1 class="logo-text">Instagram</h1>
            <form class="auth-form" id="login-form">
                <div class="input-group">
                    <input type="text" placeholder="Phone number, username, or email" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="auth-btn">Log In</button>
                
                <div class="divider">
                    <div class="line"></div>
                    <div class="or">OR</div>
                    <div class="line"></div>
                </div>
                
                <div class="fb-login">
                    <span class="material-icons">facebook</span>
                    <span>Log in with Facebook</span>
                </div>
                
                <a href="#" class="forgot-password">Forgot password?</a>
            </form>
        </div>
        
        <div class="auth-box signup-box">
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
        
        <div class="get-app">
            <p>Get the app.</p>
            <div class="app-badges">
                <img src="https://developer.apple.com/app-store/marketing/guidelines/images/badge-download-on-the-app-store.svg" alt="Download on the App Store">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play">
            </div>
        </div>
    </div>

    <a href="../index.html" class="go-back-btn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
        <path d="M7.828 11H20v2H7.828l5.364 5.364-1.414 1.414L4 12l7.778-7.778 1.414 1.414z"/>
      </svg>
      Go Back
    </a>

    <script src="auth.js"></script>
</body>
</html>
