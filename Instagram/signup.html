<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up • Instagram</title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/174/174855.png">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1 class="logo-text">Instagram</h1>
            <form class="auth-form" id="signup-form">
                <h2 class="signup-text">Sign up to see photos and videos from your friends.</h2>
                
                <button type="button" class="auth-btn" style="display: flex; justify-content: center; align-items: center; gap: 8px;">
                    <span class="material-icons" style="font-size: 18px;">facebook</span> Log in with Facebook
                </button>

                <div class="divider">
                    <div class="line"></div>
                    <div class="or">OR</div>
                    <div class="line"></div>
                </div>

                <div class="input-group">
                    <input type="text" placeholder="Mobile Number or Email" required>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                
                <p style="font-size: 12px; color: #8e8e8e; text-align: center; margin: 10px 0;">
                    People who use our service may have uploaded your contact information to Instagram. <a href="#" style="color: #00376b;">Learn More</a>
                </p>
                <p style="font-size: 12px; color: #8e8e8e; text-align: center; margin-bottom: 15px;">
                    By signing up, you agree to our <a href="#" style="color: #00376b;">Terms</a> , <a href="#" style="color: #00376b;">Privacy Policy</a> and <a href="#" style="color: #00376b;">Cookies Policy</a> .
                </p>

                <button type="submit" class="auth-btn">Sign up</button>
            </form>
        </div>
        
        <div class="auth-box signup-box">
            <p>Have an account? <a href="login.html">Log in</a></p>
        </div>
        
        <div class="get-app">
            <p>Get the app.</p>
            <div class="app-badges">
                <img src="https://developer.apple.com/app-store/marketing/guidelines/images/badge-download-on-the-app-store.svg" alt="Download on the App Store">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play">
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
