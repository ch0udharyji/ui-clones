<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password reset / X</title>
    <link rel="stylesheet" href="forgot-password-styles.css" />
  </head>
  <body>
    <div class="overlay">
      <div class="modal">
        <div class="modal-header">
          <a href="../index.html" class="close-btn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <g>
                <path
                  d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"
                ></path>
              </g>
            </svg>
          </a>
          <div class="logo">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="#fff">
              <g>
                <path
                  d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.008 5.96H5.078z"
                ></path>
              </g>
            </svg>
          </div>
          <div class="spacer"></div>
        </div>
        <div class="modal-content">
          <h1>Find your X account</h1>
          <p class="subtitle">
            Enter the email, phone number, or username associated with your
            account to change your password.
          </p>
          <div class="input-group">
            <input type="text" id="identifier" placeholder=" " required />
            <label for="identifier">Email, phone number, or username</label>
          </div>
          <div class="flex-spacer"></div>
          <a
            href="../Login/x-login.html"
            class="btn btn-primary btn-large w-100"
            >Next</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
