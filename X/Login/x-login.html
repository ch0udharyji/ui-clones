<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in to X / X</title>
    <link rel="stylesheet" href="x-login-styles.css" />
  </head>
  <body>
    <div class="overlay">
      <div class="modal">
        <div class="modal-header">
          <button class="close-btn" id="closeBtn" style="visibility: hidden">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <g>
                <path
                  d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"
                ></path>
              </g>
            </svg>
          </button>
          <div class="logo">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="#fff">
              <g>
                <path
                  d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.008 5.96H5.078z"
                ></path>
              </g>
            </svg>
          </div>
          <div class="spacer"></div>
        </div>

        <div class="modal-content" id="step1">
          <h1>Sign in to X</h1>

          <div class="oauth-buttons">
            <button class="btn btn-oauth">
              <img
                src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/google.svg"
                alt="Google"
              />
              Sign in with Google
            </button>
            <button class="btn btn-oauth btn-apple">
              <svg viewBox="0 0 24 24" fill="#000">
                <path
                  d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.12 0-.23-.02-.3-.03-.01-.06-.04-.22-.04-.39 0-1.15.572-2.27 1.206-2.98.804-.94 2.142-1.64 3.248-1.68.03.13.05.28.05.43zm4.565 15.71c-.03.07-.463 1.58-1.518 3.12-.928 1.34-1.894 2.68-3.317 2.68-1.33 0-1.815-.84-3.355-.84-1.518 0-2.072.81-3.328.81-1.31 0-2.39-1.4-3.355-2.76-1.99-2.82-3.38-8.11-1.35-11.66 1.002-1.73 2.762-2.83 4.67-2.83 1.282 0 2.45.86 3.328.86.887 0 2.28-1.01 3.86-1.01 1.63 0 3.03.74 3.91 1.94-3.37 2.05-2.84 6.42.53 7.82-.16.48-.37 1-.625 1.53z"
                ></path>
              </svg>
              Sign in with Apple
            </button>
          </div>

          <div class="divider">
            <span>or</span>
          </div>

          <div class="input-group">
            <input type="text" iSd="identifier" placeholder=" " />
            <label for="identifier">Phone, email, or username</label>
          </div>

          <button class="btn btn-primary" id="nextBtn">Next</button>
          <a
            href="../Forgot-Password/forgot-password.html"
            class="btn btn-secondary"
            style="text-decoration: none"
            >Forgot password?</a
          >

          <div class="signup-text">
            Don't have an account? <a href="../Sign-Up/sign-up.html">Sign up</a>
          </div>
        </div>

        <div class="modal-content" id="step2" style="display: none">
          <h1 class="mb-4">Enter your password</h1>

          <div class="input-group disabled-group has-value">
            <input type="text" id="displayIdentifier" disabled />
            <label>Username</label>
          </div>

          <div class="input-group password-group">
            <input type="password" id="password" placeholder=" " />
            <label for="password">Password</label>
            <button type="button" class="toggle-password" id="togglePassword">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="#71767b">
                <g>
                  <path
                    d="M12 4.5C6.5 4.5 2 12 2 12s4.5 7.5 10 7.5 10-7.5 10-7.5-4.5-7.5-10-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
                  ></path>
                </g>
              </svg>
            </button>
          </div>

          <div class="forgot-link">
            <a href="../Forgot-Password/forgot-password.html"
              >Forgot password?</a
            >
          </div>

          <div class="flex-spacer"></div>

          <div class="login-footer">
            <button class="btn btn-primary btn-large w-100" id="loginBtn">
              Log in
            </button>
            <div class="signup-text">
              Don't have an account?
              <a href="../Sign-Up/sign-up.html">Sign up</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="x-login-scripts.js"></script>
  </body>
</html>
