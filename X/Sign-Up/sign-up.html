<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up for X / X</title>
    <link rel="stylesheet" href="sign-up-styles.css" />
  </head>
  <body>
    <div class="overlay">
      <div class="modal">
        <div class="modal-header">
          <a href="../x-home.html" class="close-btn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <g>
                <path
                  d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"
                ></path>
              </g>
            </svg>
          </a>
          <div class="logo">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="#fff">
              <g>
                <path
                  d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.008 5.96H5.078z"
                ></path>
              </g>
            </svg>
          </div>
          <div class="spacer"></div>
        </div>
        <div class="modal-content">
          <h1>Create your account</h1>
          <div class="input-group">
            <input type="text" id="name" placeholder=" " required />
            <label for="name">Name</label>
          </div>
          <div class="input-group">
            <input type="email" id="email" placeholder=" " required />
            <label for="email">Phone, email, or username</label>
          </div>
          <div class="date-section">
            <h4>Date of birth</h4>
            <p>
              This will not be shown publicly. Confirm your own age, even if
              this account is for a business, a pet, or something else.
            </p>
            <div class="dob-selectors">
              <select aria-label="Month">
                <option value="" disabled selected>Month</option>
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
              </select>
              <select aria-label="Day">
                <option value="" disabled selected>Day</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
              </select>
              <select aria-label="Year">
                <option value="" disabled selected>Year</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
              </select>
            </div>
          </div>
          <div class="flex-spacer"></div>
          <a href="../index.html" class="btn btn-primary btn-large w-100"
            >Next</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
