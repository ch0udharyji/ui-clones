<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work In Progress</title>
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Google Sans Code', monospace;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .content-wrapper {
            max-width: 600px;
            padding: 40px;
            text-align: left;
        }
        .status-badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 24px;
            border: 1px solid var(--border-hover-color);
            padding: 4px 12px;
            border-radius: 100px;
        }
        h1 {
            font-size: 48px;
            font-weight: 600;
            margin: 0 0 16px 0;
            color: var(--text-color);
            line-height: 1.1;
            letter-spacing: -1px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            color: var(--text-muted);
            margin: 0 0 48px 0;
            max-width: 400px;
        }
        .go-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        .go-back-btn i {
            font-size: 14px;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .go-back-btn:hover {
            color: var(--text-muted);
        }
        .go-back-btn:hover i {
            transform: translateX(-6px);
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <div class="status-badge">In Development</div>
        <h1>Almost there.</h1>
        <p>This clone is currently being built. Check back later to see the final result.</p>
        <a href="../index.html" class="go-back-btn">
            <i class="fa-solid fa-arrow-left"></i> Return home
        </a>
    </div>
</body>
</html>
